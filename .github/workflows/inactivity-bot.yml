name: inactivity bot

on:
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    permissions:
      issues: write

    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: "open"
              }
            );

            const now = new Date();

            for (const issue of issues) {

              if (issue.pull_request) continue;
              if (!issue.assignees.length) continue;

              const lastActivity = new Date(issue.updated_at);

              const diffDays =
                Math.floor((now - lastActivity) / (1000 * 60 * 60 * 24));

              const labels = issue.labels.map(l => l.name);

              // Day 3 Friendly Warning
              if (diffDays >= 3 && !labels.includes("warning-sent")) {

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: "👋 Friendly Reminder\n\nThis issue has been inactive for 3 days. Please share a progress update."
                });

                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: ["warning-sent"]
                });
              }

              // Day 4 Final Warning
              else if (
                diffDays >= 4 &&
                labels.includes("warning-sent") &&
                !labels.includes("final-warning")
              ) {

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: "⚠️ Final Warning\n\nNo update received. Please respond within 24 hours or this issue will be unassigned."
                });

                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: ["final-warning"]
                });
              }

              // Day 5 Auto Unassign
              else if (
                diffDays >= 5 &&
                labels.includes("final-warning")
              ) {

                await github.rest.issues.removeAllAssignees({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number
                });

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: "🔄 Issue unassigned due to inactivity. This issue is now available for reassignment."
                });
              }
            }
